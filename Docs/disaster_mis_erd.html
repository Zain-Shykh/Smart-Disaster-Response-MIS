
<style>
#erd-wrap { padding: 8px 0; overflow-x: auto; }
#erd svg { max-width: 100%; }
.erd-legend { display: flex; flex-wrap: wrap; gap: 12px; margin: 12px 0 4px; font-size: 12px; color: var(--color-text-secondary); }
.erd-legend span { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
</style>
<div class="erd-legend">
  <span><span class="legend-dot" style="background:#3B8BD4"></span>Core / RBAC</span>
  <span><span class="legend-dot" style="background:#1D9E75"></span>Emergency & Events</span>
  <span><span class="legend-dot" style="background:#BA7517"></span>Resources & Warehouse</span>
  <span><span class="legend-dot" style="background:#D85A30"></span>Hospital & Patients</span>
  <span><span class="legend-dot" style="background:#7F77DD"></span>Finance</span>
  <span><span class="legend-dot" style="background:#D4537E"></span>Approvals & Audit</span>
</div>
<div id="erd-wrap"><div id="erd"></div></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a2535' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#B5D4F4' : '#042C53',
  },
});

const diagram = `erDiagram
  USER {
    int UserID PK
    string Username
    string PasswordHash
    string Email
    string FirstName
    string LastName
    datetime CreatedAt
    bool IsActive
  }
  ROLE {
    int RoleID PK
    string RoleName
    string Description
  }
  PERMISSION {
    int PermissionID PK
    string PermissionName
    string Module
    string Action
  }
  USER_ROLE {
    int UserID FK
    int RoleID FK
    datetime AssignedAt
    int AssignedBy FK
  }
  ROLE_PERMISSION {
    int RoleID FK
    int PermissionID FK
  }
  CITIZEN {
    int CitizenID PK
    string FirstName
    string LastName
    string Email
    string NationalID
    string Street
    string City
    string Province
  }
  CITIZEN_PHONE {
    int PhoneID PK
    int CitizenID FK
    string PhoneNumber
  }
  EMERGENCY_REPORT {
    int ReportID PK
    int CitizenID FK
    int EventID FK
    float Latitude
    float Longitude
    string Address
    string DisasterType
    string SeverityLevel
    datetime ReportTime
    string Status
    string Source
  }
  DISASTER_EVENT {
    int EventID PK
    string EventName
    string DisasterType
    datetime StartTime
    datetime EndTime
    string Location
    string Status
    int AffectedPopulation
  }
  RESCUE_TEAM {
    int TeamID PK
    string TeamName
    string TeamType
    float CurrentLatitude
    float CurrentLongitude
    string AvailabilityStatus
    int Capacity
  }
  TEAM_ACTIVITY {
    int ActivityID PK
    int TeamID FK
    string ActivityType
    datetime StartTime
    datetime EndTime
    string Notes
    string Outcome
  }
  TEAM_ASSIGNMENT {
    int AssignmentID PK
    int TeamID FK
    int ReportID FK
    int AssignedBy FK
    datetime AssignmentTime
    datetime CompletionTime
    string Status
  }
  RESOURCE {
    int ResourceID PK
    string ResourceName
    string ResourceType
    string Unit
    string Description
  }
  WAREHOUSE {
    int WarehouseID PK
    string WarehouseName
    string Address
    string City
    int ManagerID FK
    int Capacity
  }
  INVENTORY {
    int InventoryID PK
    int WarehouseID FK
    int ResourceID FK
    int Quantity
    int MinThreshold
    int MaxCapacity
    datetime LastUpdated
  }
  INVENTORY_ALERT {
    int AlertID PK
    int InventoryID FK
    string AlertType
    datetime AlertTime
    string Status
    datetime ResolvedAt
  }
  RESOURCE_ALLOCATION {
    int AllocationID PK
    int InventoryID FK
    int EventID FK
    int RequestedBy FK
    int Quantity
    datetime RequestTime
    string Status
    datetime DispatchedAt
  }
  HOSPITAL {
    int HospitalID PK
    string HospitalName
    string Address
    string City
    int TotalBeds
    int AvailableBeds
    string ContactPhone
    string ContactEmail
  }
  PATIENT {
    int PatientID PK
    string FirstName
    string LastName
    int Age
    string Gender
    string NationalID
    string BloodType
  }
  PATIENT_ADMISSION {
    int AdmissionID PK
    int PatientID FK
    int HospitalID FK
    int ReportID FK
    datetime AdmissionTime
    datetime DischargeTime
    string Condition
    string Status
  }
  DONOR {
    int DonorID PK
    string FullName
    string DonorType
    string OrganizationName
    string Email
    string ContactPhone
  }
  DONATION {
    int DonationID PK
    int DonorID FK
    int EventID FK
    decimal Amount
    datetime DonationDate
    string PaymentMethod
    string Status
  }
  EXPENSE {
    int ExpenseID PK
    int EventID FK
    int ApprovedBy FK
    string Category
    decimal Amount
    string Description
    datetime ExpenseDate
    string PaymentStatus
  }
  APPROVAL_REQUEST {
    int RequestID PK
    int RequestedBy FK
    int ReviewedBy FK
    string RequestType
    datetime RequestTime
    string Status
    string Description
    int ReferenceID
    string ReferenceType
  }
  APPROVAL_HISTORY {
    int HistoryID PK
    int RequestID FK
    int ActionBy FK
    datetime ActionTime
    string Decision
    string Comments
  }
  AUDIT_LOG {
    int LogID PK
    int UserID FK
    string Action
    string TableName
    int RecordID
    datetime Timestamp
    string IPAddress
  }

  USER ||--o{ USER_ROLE : "has"
  ROLE ||--o{ USER_ROLE : "assigned to"
  ROLE ||--o{ ROLE_PERMISSION : "grants"
  PERMISSION ||--o{ ROLE_PERMISSION : "granted via"
  CITIZEN ||--o{ CITIZEN_PHONE : "has"
  CITIZEN ||--o{ EMERGENCY_REPORT : "submits"
  EMERGENCY_REPORT }o--o| DISASTER_EVENT : "categorized in"
  RESCUE_TEAM ||--o{ TEAM_ACTIVITY : "records"
  RESCUE_TEAM ||--o{ TEAM_ASSIGNMENT : "assigned via"
  EMERGENCY_REPORT ||--o{ TEAM_ASSIGNMENT : "handled by"
  USER ||--o{ TEAM_ASSIGNMENT : "assigns"
  RESOURCE ||--o{ INVENTORY : "stocked in"
  WAREHOUSE ||--o{ INVENTORY : "holds"
  USER ||--o{ WAREHOUSE : "manages"
  INVENTORY ||--o{ INVENTORY_ALERT : "triggers"
  INVENTORY ||--o{ RESOURCE_ALLOCATION : "allocated via"
  DISASTER_EVENT ||--o{ RESOURCE_ALLOCATION : "consumes"
  USER ||--o{ RESOURCE_ALLOCATION : "requests"
  HOSPITAL ||--o{ PATIENT_ADMISSION : "admits"
  PATIENT ||--o{ PATIENT_ADMISSION : "admitted via"
  EMERGENCY_REPORT ||--o{ PATIENT_ADMISSION : "results in"
  DONOR ||--o{ DONATION : "makes"
  DONATION }o--|| DISASTER_EVENT : "funds"
  EXPENSE }o--|| DISASTER_EVENT : "charged to"
  USER ||--o{ EXPENSE : "approves"
  USER ||--o{ APPROVAL_REQUEST : "requests"
  APPROVAL_REQUEST ||--o{ APPROVAL_HISTORY : "tracks"
  USER ||--o{ APPROVAL_HISTORY : "decides"
  USER ||--o{ AUDIT_LOG : "generates"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
